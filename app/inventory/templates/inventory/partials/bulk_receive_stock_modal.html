<div x-show="bulkReceiveModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-gray-800 bg-opacity-75"
    x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" style="display: none;">

    <div @click.away="closeBulkReceiveStockModal()"
        class="relative bg-white rounded-lg shadow-xl w-full max-w-2xl p-6 sm:p-8 m-4 max-h-[90vh] flex flex-col"
        x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 transform scale-95"
        x-transition:enter-end="opacity-100 transform scale-100"
        x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100 transform scale-100"
        x-transition:leave-end="opacity-0 transform scale-95">

        <button @click="closeBulkReceiveStockModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <h3 class="text-2xl font-bold text-gray-800 mb-2">Bulk Receive Stock</h3>
        <p class="text-sm text-gray-600 mb-4">
            Invoice: <strong x-text="bulkReceiveData.invoiceId"></strong>
            · Supplier: <strong x-text="bulkReceiveData.supplierName"></strong>
        </p>

        <div class="mb-4">
            <label for="br_received_date" class="font-semibold text-gray-700 block mb-1">Received Date</label>
            <input type="date"
                   id="br_received_date"
                   x-model="bulkReceiveData.received_date"
                   required
                   class="w-full max-w-xs p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div class="flex-1 overflow-y-auto border border-gray-200 rounded-md">
            <table class="min-w-full text-sm divide-y divide-gray-200">
                <thead class="bg-gray-50 sticky top-0">
                    <tr>
                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">SKU</th>
                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase">Remaining</th>
                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase w-28">Receive</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100">
                    <template x-for="(item, idx) in bulkReceiveData.items" :key="item.invoiceItemId">
                        <tr>
                            <td class="px-3 py-2 text-gray-900" x-text="item.productName"></td>
                            <td class="px-3 py-2 text-gray-500 font-mono text-xs" x-text="item.productSku || '-'"></td>
                            <td class="px-3 py-2 text-right tabular-nums text-gray-500" x-text="item.quantity_remaining"></td>
                            <td class="px-3 py-2 text-right">
                                <input type="number"
                                       x-model.number="item.quantity_to_receive"
                                       :max="item.quantity_remaining"
                                       min="1"
                                       class="w-full px-2 py-1 border border-gray-300 rounded-md text-sm tabular-nums focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <p x-show="bulkReceiveError" x-text="bulkReceiveError" class="mt-4 text-sm text-red-600"></p>

        <div class="mt-6 flex justify-end space-x-3">
            <button type="button"
                    @click="closeBulkReceiveStockModal()"
                    :disabled="bulkReceiveSaving"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50">
                Cancel
            </button>
            <button type="button"
                    @click="submitBulkReceiveStock()"
                    :disabled="bulkReceiveSaving || !bulkReceiveData.items.length"
                    class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 disabled:opacity-50">
                <span x-show="!bulkReceiveSaving">Confirm bulk receive</span>
                <span x-show="bulkReceiveSaving">Receiving…</span>
            </button>
        </div>
    </div>
</div>
