<div x-show="editModalOpen" x-cloak id="editInvoiceModal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-800 bg-opacity-75"
    x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" style="display: none;">

    <div @click.away="editModalOpen = false"
        class="relative bg-white rounded-xl shadow-2xl w-full max-w-3xl p-6 sm:p-8 m-4 max-h-[92vh] overflow-y-auto"
        x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 transform scale-95"
        x-transition:enter-end="opacity-100 transform scale-100"
        x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100 transform scale-100"
        x-transition:leave-end="opacity-0 transform scale-95">

        <button @click="editModalOpen = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <h3 class="text-xl font-bold text-gray-800 mb-5">Edit Invoice <span x-text="currentInvoice.invoice_id" class="text-indigo-600 font-mono"></span></h3>

        <template x-if="editModalOpen">
            <form id="edit-invoice-form" @submit.prevent="submitInvoiceUpdate">
                {% csrf_token %}
                <div class="space-y-5">
                    <div>
                        <label class="font-semibold text-gray-700 block mb-2">Status</label>
                        <div class="overflow-x-auto -mx-1 px-1 pb-0.5">
                            <div class="inline-flex min-w-full rounded-md shadow-sm border border-gray-300 overflow-hidden"
                                 role="group" aria-label="Invoice status">
                                {% for value, display in invoice_status_choices %}
                                <button type="button"
                                        @click="currentInvoice.status = '{{ value }}'"
                                        class="flex-1 min-w-[4.5rem] px-2 sm:px-3 py-2.5 text-xs sm:text-sm font-medium border-r border-gray-300 last:border-r-0 whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500 transition-colors"
                                        :class="invoiceStatusBarClass('{{ value }}')"
                                        :aria-pressed="currentInvoice.status === '{{ value }}'"
                                        title="{{ display }}">
                                    {% if value == 'PARTIALLY_RECEIVED' %}Partial{% elif value == 'FULLY_RECEIVED' %}Full{% else %}{{ display }}{% endif %}
                                </button>
                                {% endfor %}
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="id_edit_payment_date" class="font-semibold text-gray-700 block mb-1">Payment Date</label>
                            <input type="date" id="id_edit_payment_date" x-model="currentInvoice.payment_date"
                                   class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <p class="text-xs text-gray-500 mt-1">Leave blank unless paid. Auto-set when status is Paid.</p>
                        </div>
                        <div>
                            <label for="id_edit_transport" class="font-semibold text-gray-700 block mb-1">Transportation Cost (RM)</label>
                            <input type="number" id="id_edit_transport" x-model.number="currentInvoice.transportation_cost"
                                   step="0.01" min="0"
                                   class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 tabular-nums">
                        </div>
                    </div>

                    {# Invoice line items #}
                    <div>
                        <label class="font-semibold text-gray-700 block mb-2">Line Items</label>
                        <div class="rounded-lg border border-gray-200 overflow-hidden">
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase w-24">Qty</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase w-28">Received</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase w-36">Unit Price (RM)</th>
                                        {% if request.user.is_superuser %}
                                        <th class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase w-28">Actions</th>
                                        {% endif %}
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-100">
                                    <template x-if="!currentInvoice.items || currentInvoice.items.length === 0">
                                        <tr><td colspan="{% if request.user.is_superuser %}5{% else %}4{% endif %}" class="px-3 py-4 text-center text-gray-400">No line items.</td></tr>
                                    </template>
                                    <template x-for="(item, idx) in (currentInvoice.items || [])" :key="item.id">
                                        <tr>
                                            <td class="px-3 py-2">
                                                <p class="font-medium text-gray-900" x-text="item.product_name"></p>
                                                <p class="text-xs text-gray-400 font-mono" x-text="item.sku"></p>
                                            </td>
                                            <td class="px-3 py-2">
                                                <input type="number"
                                                       x-model.number="item.quantity"
                                                       :min="item.quantity_received || 0"
                                                       step="1"
                                                       class="w-full px-2 py-1.5 border border-gray-300 rounded-md text-sm tabular-nums focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                                            </td>
                                            <td class="px-3 py-2 text-gray-500 tabular-nums" x-text="item.quantity_received || 0"></td>
                                            <td class="px-3 py-2">
                                                <input type="number"
                                                       x-model="item.unit_price"
                                                       step="0.01" min="0"
                                                       class="w-full px-2 py-1.5 border border-gray-300 rounded-md text-sm tabular-nums focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                                            </td>
                                            {% if request.user.is_superuser %}
                                            <td class="px-3 py-2 text-right">
                                                <button type="button"
                                                        x-show="(item.quantity_received || 0) > 0"
                                                        @click="revertInvoiceItemReceived(item)"
                                                        :disabled="invoiceRevertSaving === item.id"
                                                        class="inline-flex items-center px-2 py-1 text-xs font-medium text-rose-700 bg-rose-50 border border-rose-200 rounded-md hover:bg-rose-100 disabled:opacity-50">
                                                    <span x-show="invoiceRevertSaving !== item.id">Revert received</span>
                                                    <span x-show="invoiceRevertSaving === item.id">Reverting…</span>
                                                </button>
                                            </td>
                                            {% endif %}
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <p class="text-xs text-gray-400 mt-1.5">Quantity cannot be reduced below the amount already received.{% if request.user.is_superuser %} Superusers can revert received stock (removes inventory batches).{% endif %}</p>
                    </div>

                    <div>
                        <label for="id_edit_notes" class="font-semibold text-gray-700 block mb-1">Notes</label>
                        <textarea id="id_edit_notes" x-model="currentInvoice.notes" rows="2"
                                  class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                    </div>
                </div>

                <p x-show="invoiceEditError" x-text="invoiceEditError" class="mt-3 text-sm text-red-600"></p>

                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" @click="editModalOpen = false"
                            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                        Cancel
                    </button>
                    <button type="submit" :disabled="invoiceEditSaving"
                            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50">
                        <span x-show="!invoiceEditSaving">Save Changes</span>
                        <span x-show="invoiceEditSaving">Saving…</span>
                    </button>
                </div>
            </form>
        </template>
    </div>
</div>
