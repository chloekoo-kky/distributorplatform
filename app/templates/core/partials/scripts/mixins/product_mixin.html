<script>
    function manageProductMixin() {
        return {
            // Pricing Modal State
            showPricingModal: false,
            pricingIsSubmitting: false,
            pricingReadOnly: false,
            pricingData: {
                id: null, name: '', base_cost: null, profit_margin: null,
                selling_price: null, is_promotion: false, promotion_rate: null, update_url: '',
                supplier_costs: [], price_tiers: []
            },

            // Product Edit Modal State
            showProductEditModal: false,
            productEditIsLoading: false,
            productEditIsSubmitting: false,
            productEditData: {
                id: null, name: '', sku: '', description: '', origin_country: '',
                members_only: false, is_featured: false, is_best_seller: false, // <--- ADDED
                categories: [], suppliers: [], featured_image: null,
                gallery_images: [], update_url: '', selectedImageUrl: ''
            },
            productEditErrors: {},

            // Upload Products State
            uploadStep: 1,
            uploadIsLoading: false,
            uploadTempFilePath: '',
            uploadPreviewData: [],
            uploadTotalRows: 0,
            uploadErrorMessage: '',

            commissionProfit() {
                const sellPrice = parseFloat(this.pricingData.selling_price);
                const baseCost = parseFloat(this.pricingData.base_cost);
                if (isNaN(sellPrice) || isNaN(baseCost) || baseCost <= 0) {
                    return null;
                }
                const profit = sellPrice - baseCost;
                return profit > 0 ? profit : null;
            },
            commissionAmount(group) {
                const profit = this.commissionProfit();
                if (profit === null || !group || !group.commission_percentage) {
                    return null;
                }
                return (profit * (group.commission_percentage / 100)).toFixed(2);
            },

            get selectedBaseCostSupplierName() {
                if (!this.pricingData.supplier_costs || this.pricingData.supplier_costs.length === 0 || this.pricingData.base_cost == null) return null;
                const match = this.pricingData.supplier_costs.find(sc => parseFloat(sc.cost) === parseFloat(this.pricingData.base_cost));
                return match ? match.supplier_name : null;
            },

            get selectedGalleryImages() {
                if (!this.productEditData.id) return [];
                return Alpine.store('images').galleryImages.filter(image =>
                    this.productEditData.gallery_images.includes(image.id)
                );
            },

            // --- Pricing Methods ---
            async openPricingModal(product) {
                // Reset any previous pricing state so we never leak values between products.
                this.pricingData = {
                    id: null,
                    name: '',
                    base_cost: null,
                    profit_margin: null,
                    selling_price: null,
                    is_promotion: false,
                    promotion_rate: null,
                    update_url: '',
                    supplier_costs: [],
                    price_tiers: []
                };
                this.pricingReadOnly = false;

                this.showPricingModal = true;

                try {
                    const response = await fetch(`/api/manage-pricing/${product.id}/`, {
                        method: 'GET',
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest',
                            'Accept': 'application/json'
                        }
                    });
                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        Alpine.store('globals').showToast(data.error || 'Could not load pricing data.', 'error');
                        this.showPricingModal = false;
                        return;
                    }

                    console.log('[PricingModal][open]', data);

                    const supplierCosts = (data.supplier_costs || []).map(sc => ({ ...sc }));
                    let baseCost = null;
                    // Use saved_base_cost when set (user has chosen a source); otherwise use computed base_cost
                    // (e.g. latest quoted cost) so products created from quotation import show their cost.
                    if (data.saved_base_cost != null) {
                        baseCost = parseFloat(data.saved_base_cost);
                    } else if (data.base_cost != null && data.base_cost !== '') {
                        baseCost = parseFloat(data.base_cost);
                    }

                    let profitMargin = data.profit_margin != null ? parseFloat(data.profit_margin) : null;
                    let sellingPrice = data.selling_price != null ? parseFloat(data.selling_price) : null;

                    if (baseCost !== null) {
                        if (sellingPrice !== null && profitMargin === null) {
                            if (sellingPrice > 0) {
                                profitMargin = ((sellingPrice - baseCost) / sellingPrice) * 100;
                            }
                        } else if (sellingPrice === null && profitMargin !== null) {
                            const marginDecimal = profitMargin / 100;
                            if (marginDecimal < 1) {
                                sellingPrice = baseCost / (1 - marginDecimal);
                            }
                        }
                    }

                    const priceTiers = (data.price_tiers || []).map(t => ({
                        _tid: crypto.randomUUID(),
                        min_quantity: parseInt(t.min_quantity, 10) || 1,
                        profit_margin: t.profit_margin != null ? parseFloat(t.profit_margin) : null,
                        price: t.price != null ? parseFloat(t.price) : null
                    }));
                    priceTiers.sort((a, b) => (a.min_quantity || 0) - (b.min_quantity || 0));

                    this.pricingData = {
                        id: data.id,
                        name: data.name,
                        base_cost: baseCost,
                        profit_margin: profitMargin !== null ? Math.round(profitMargin) : null,
                        selling_price: sellingPrice != null ? parseFloat(sellingPrice.toFixed(2)) : null,
                        is_promotion: !!data.is_promotion,
                        promotion_rate: data.promotion_rate != null ? parseFloat(data.promotion_rate) : null,
                        update_url: `/api/manage-pricing/${data.id}/`,
                        supplier_costs: supplierCosts,
                        price_tiers: priceTiers
                    };
                    // If there is already pricing (main price or tiers), start in read-only mode,
                    // and require an explicit "Edit" action to modify.
                    if (this.pricingData.selling_price != null || (this.pricingData.price_tiers && this.pricingData.price_tiers.length > 0)) {
                        this.pricingReadOnly = true;
                    } else {
                        this.pricingReadOnly = false;
                    }

                    console.log('[PricingModal][state]', this.pricingData);
                    console.log('[CommissionDebug][afterSet]', {
                        pricingProfit: this.pricingProfit,
                        selling_price: this.pricingData.selling_price,
                        base_cost: this.pricingData.base_cost,
                        groups: Alpine.store('globals').allUserGroupsList,
                    });
                } catch (err) {
                    console.error('Failed to load pricing data:', err);
                    Alpine.store('globals').showToast('Network error while loading pricing.', 'error');
                    this.showPricingModal = false;
                }
            },

            calculatePriceFromMargin() {
                const cost = parseFloat(this.pricingData.base_cost);
                const margin = parseFloat(this.pricingData.profit_margin);

                if (isNaN(cost) || isNaN(margin)) {
                    this.pricingData.selling_price = null;
                    return;
                }
                const marginDecimal = margin / 100;
                if (marginDecimal >= 1) {
                    this.pricingData.selling_price = null;
                    return;
                }
                const price = cost / (1 - marginDecimal);
                this.pricingData.selling_price = parseFloat(price.toFixed(2));
            },

            calculateMarginFromPrice() {
                const cost = parseFloat(this.pricingData.base_cost);
                const price = parseFloat(this.pricingData.selling_price);
                if (isNaN(cost) || isNaN(price) || price === 0) {
                    this.pricingData.profit_margin = null;
                    return;
                }
                const margin = ((price - cost) / price) * 100;
                this.pricingData.profit_margin = Math.round(margin);
            },

            sortPriceTiers() {
                const tiers = this.pricingData.price_tiers;
                if (!tiers || tiers.length < 2) return;
                tiers.sort((a, b) => (a.min_quantity || 0) - (b.min_quantity || 0));
            },

            // Price tier: selling price from base cost and profit margin
            tierSellingPrice(tier) {
                const base = parseFloat(this.pricingData.base_cost);
                const margin = tier.profit_margin != null ? parseFloat(tier.profit_margin) : null;
                if (base == null || isNaN(base) || base <= 0 || margin == null || isNaN(margin) || margin >= 100) return null;
                const price = base / (1 - margin / 100);
                return parseFloat(price.toFixed(2));
            },

            // When user edits tier price: recompute profit margin (like calculateMarginFromPrice for main selling price)
            updateTierMarginFromPrice(tier) {
                const base = parseFloat(this.pricingData.base_cost);
                const price = tier.price != null ? parseFloat(tier.price) : null;
                if (base == null || isNaN(base) || base <= 0 || price == null || isNaN(price) || price <= 0) return;
                const margin = ((price - base) / price) * 100;
                tier.profit_margin = Math.round(margin * 10) / 10;
            },

            // When user edits tier margin: update tier price so the price input stays in sync
            updateTierPriceFromMargin(tier) {
                const computed = this.tierSellingPrice(tier);
                if (computed != null) tier.price = computed;
            },

            // Profit per unit for a tier (price - base cost)
            tierProfitPerUnit(tier) {
                const base = parseFloat(this.pricingData.base_cost);
                const price = tier.price != null ? parseFloat(tier.price) : null;
                if (base == null || isNaN(base) || price == null || isNaN(price)) return null;
                const profit = price - base;
                return profit > 0 ? parseFloat(profit.toFixed(2)) : null;
            },

            addPricingTier() {
                const defaultMargin = this.pricingData.profit_margin != null ? this.pricingData.profit_margin : 20;
                const maxMinQty = this.pricingData.price_tiers.length
                    ? Math.max(...this.pricingData.price_tiers.map(t => t.min_quantity || 0))
                    : 0;
                const newTier = {
                    _tid: crypto.randomUUID(),
                    min_quantity: maxMinQty + 10,
                    profit_margin: defaultMargin,
                    price: null
                };
                this.pricingData.price_tiers.push(newTier);
                newTier.price = this.tierSellingPrice(newTier);
                this.sortPriceTiers();
            },

            removePricingTier(index) {
                this.pricingData.price_tiers.splice(index, 1);
            },

            async submitPricingUpdate() {
                if (this.pricingIsSubmitting) return;
                this.pricingIsSubmitting = true;

                const payload = {
                    profit_margin: this.pricingData.profit_margin,
                    selling_price: this.pricingData.selling_price,
                    is_promotion: this.pricingData.is_promotion,
                    promotion_rate: this.pricingData.promotion_rate,
                    base_cost: this.pricingData.base_cost != null ? this.pricingData.base_cost : null,
                    price_tiers: this.pricingData.price_tiers.map(t => ({
                        min_quantity: t.min_quantity,
                        // Send price as the source of truth; margin is informational
                        price: t.price,
                        profit_margin: t.profit_margin
                    }))
                };

                try {
                    const response = await fetch(this.pricingData.update_url, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken,
                            'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.showPricingModal = false;
                        Alpine.store('globals').showToast('Pricing updated successfully!');
                        window.dispatchEvent(new CustomEvent('refresh-data', { detail: { tab: 'products' } }));
                    } else {
                        Alpine.store('globals').showToast('Error updating pricing: ' + (data.error || 'Unknown error'), 'error');
                    }
                } catch (err) {
                    Alpine.store('globals').showToast('A network error occurred: ' + err.message, 'error');
                } finally {
                    this.pricingIsSubmitting = false;
                }
            },

            // --- Product Edit Methods ---
            async openProductEditModal(productId) {
                this.productEditIsLoading = true;
                this.showProductEditModal = true;
                this.productEditErrors = {};

                try {
                    const url = `/manage/edit/${productId}/`;
                    const response = await fetch(url, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    if (!response.ok) { throw new Error('Failed to load product data.'); }

                    const data = await response.json();
                    this.productEditData = data;
                } catch (err) {
                    this.productEditErrors = { '__all__': [err.message || 'Could not load data.'] };
                } finally {
                    this.productEditIsLoading = false;
                }
            },

            async submitProductEdit() {
                this.productEditIsSubmitting = true;
                this.productEditErrors = {};
                const formData = new FormData();
                formData.append('name', this.productEditData.name);
                formData.append('sku', this.productEditData.sku || '');
                formData.append('description_title', this.productEditData.description_title || '');
                formData.append('description', this.productEditData.description || '');
                formData.append('origin_country', this.productEditData.origin_country || '');

                if (this.productEditData.sections) {
                    formData.append('sections_data', JSON.stringify(this.productEditData.sections));
                }

                if (this.productEditData.members_only) {
                    formData.append('members_only', 'on');
                }

                if (this.productEditData.is_featured) {
                    formData.append('is_featured', 'on');
                }

                // --- NEW: Handle Best Seller ---
                if (this.productEditData.is_best_seller) {
                    formData.append('is_best_seller', 'on');
                }
                // ------------------------------

                if (this.productEditData.featured_image) {
                    formData.append('featured_image', this.productEditData.featured_image);
                } else {
                    formData.append('featured_image', '');
                }

                this.productEditData.categories.forEach(id => formData.append('categories', id));
                this.productEditData.suppliers.forEach(id => formData.append('suppliers', id));
                this.productEditData.gallery_images.forEach(id => formData.append('gallery_images', id));

                try {
                    const response = await fetch(this.productEditData.update_url, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken,
                            'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json'
                        },
                        body: formData
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.showProductEditModal = false;
                        Alpine.store('globals').showToast('Product updated successfully!');
                        window.dispatchEvent(new CustomEvent('refresh-data', { detail: { tab: 'products' } }));
                    } else {
                        this.productEditErrors = data.errors || { '__all__': ['An unknown error occurred.'] };
                    }
                } catch (err) {
                    this.productEditErrors = { '__all__': [err.message || 'A network error occurred.'] };
                } finally {
                    this.productEditIsSubmitting = false;
                }
            },

            removeImageFromProductGallery(imageId) {
                if (!this.productEditData || !this.productEditData.gallery_images) return;
                this.productEditData.gallery_images = this.productEditData.gallery_images.filter(id => id !== imageId);
            },

            openUploadModal() {
                // Reset upload state
                this.uploadStep = 1;
                this.uploadIsLoading = false;
                this.uploadTempFilePath = '';
                this.uploadPreviewData = [];
                this.uploadTotalRows = 0;
                this.uploadErrorMessage = '';

                // Clear file input if present
                const input = document.querySelector('#product-upload-file-input');
                if (input) {
                    input.value = '';
                }

                // This flag lives in the parent x-data (manageTools)
                window.uploadProductModalOpen = true;
            },

            async submitUploadForm(event) {
                event.preventDefault();
                if (this.uploadIsLoading) return;

                this.uploadErrorMessage = '';
                this.uploadIsLoading = true;

                const form = event.target;
                const formData = new FormData(form);

                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: formData
                    });
                    const data = await response.json();

                    if (!response.ok || !data.success) {
                        let errMsg = data.error || 'Failed to analyze file.';
                        if (data.details && Array.isArray(data.details) && data.details.length) {
                            errMsg += ' ' + data.details.join(' ');
                        }
                        this.uploadErrorMessage = errMsg;
                        return;
                    }

                    if (data.require_confirmation) {
                        this.uploadStep = 2;
                        this.uploadTempFilePath = data.temp_file_path || '';
                        this.uploadPreviewData = data.preview_data || [];
                        this.uploadTotalRows = data.total_rows || 0;
                    }
                } catch (err) {
                    this.uploadErrorMessage = err.message || 'An unexpected error occurred.';
                } finally {
                    this.uploadIsLoading = false;
                }
            },

            async confirmUpload() {
                if (this.uploadIsLoading || !this.uploadTempFilePath) return;

                this.uploadErrorMessage = '';
                this.uploadIsLoading = true;

                const formData = new FormData();
                formData.append('confirm', 'true');
                formData.append('temp_file_path', this.uploadTempFilePath);
                formData.append('csrfmiddlewaretoken', Alpine.store('globals').csrfToken);

                try {
                    const response = await fetch("{% url 'product:upload_products' %}", {
                        method: 'POST',
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: formData
                    });
                    const data = await response.json();

                    if (!response.ok || !data.success) {
                        this.uploadErrorMessage = data.error || 'Failed to import file.';
                        return;
                    }

                    alert(data.message || 'Imported successfully!');
                    window.location.reload();
                } catch (err) {
                    this.uploadErrorMessage = err.message || 'An unexpected error occurred.';
                } finally {
                    this.uploadIsLoading = false;
                }
            }
        };
    }
</script>
