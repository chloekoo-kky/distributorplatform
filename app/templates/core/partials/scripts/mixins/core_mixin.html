<script>
    function manageCoreMixin() {
        const ordersManageUrl = '{% url "order:manage_orders" %}';

        const redirectIfOrdersHash = () => {
            if (window.location.hash === '#orders') {
                window.location.replace(ordersManageUrl);
            }
        };

        return {
            // --- State ---
            tab: (() => {
                const h = window.location.hash;
                if (h === '#orders') return '#quotations';
                return h || '#quotations';
            })(),

            // Simple Modal Flags
            uploadQuotationModalOpen: false,
            createQuotationModalOpen: false,
            uploadBatchModalOpen: false,
            uploadProductModalOpen: false,

            initCore() {
                redirectIfOrdersHash();
                const tokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
                if (tokenInput) {
                    Alpine.store('globals').csrfToken = tokenInput.value;
                } else {
                    console.error('CSRF token not found on page.');
                }

                // Handle Tab Changes
                this.$watch('tab', (val) => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                window.addEventListener('hashchange', () => {
                    redirectIfOrdersHash();
                    this.tab = window.location.hash || '#quotations';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        };
    }
</script>
