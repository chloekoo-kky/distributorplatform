<script>
    document.addEventListener('alpine:init', () => {

        Alpine.data('productAccordionRow', (productId) => ({
            id: productId,
            open: false,
            batches: [],
            isLoading: false,
            hasLoaded: false,
            async toggle() {
                this.open = !this.open;
                if (this.open && !this.hasLoaded) {
                    this.isLoading = true;
                    try {
                        const response = await fetch(`/inventory/api/product-batches/${this.id}/`, {
                            headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                        });
                        if (!response.ok) throw new Error('Failed to fetch batch data.');
                        const data = await response.json();
                        this.batches = data.batches;
                        this.hasLoaded = true;
                    } catch (error) { console.error(`Failed to load batches for product ${this.id}:`, error); }
                    finally { this.isLoading = false; }
                }
            }
        }));

        Alpine.data('quotationAccordionRow', (quotationId) => ({
            id: quotationId,
            open: false,
            items: [],
            isLoading: false,
            hasLoaded: false,
            async toggle() {
                this.open = !this.open;
                if (this.open && !this.hasLoaded) {
                    this.isLoading = true;
                    try {
                        const response = await fetch(`/inventory/api/quotation-items/${this.id}/`, {
                            headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                        });
                        if (!response.ok) throw new Error('Failed to fetch quotation items.');
                        const data = await response.json();
                        this.items = data.items;
                        this.hasLoaded = true;
                    } catch (error) { console.error(`Failed to load items for quotation ${this.id}:`, error); }
                    finally { this.isLoading = false; }
                }
            }
        }));

        Alpine.data('productTableData', () => ({
            items: [],
            isLoading: true,
            pagination: {},
            filterText: '',
            filterGroup: '',
            filterCategory: '',
            allCategories: [],
            groupCategoriesMap: {},

            // --- View Mode & Selection State ---
            viewMode: 'list', // 'list' or 'grid'
            selectedIds: [],

            // --- Duplicate Checklist / Merge Tools State ---
            showMergeToolsModal: false,
            mergeIsLoading: false,
            mergeGroups: [],
            mergeSearch: '',
            mergeSearchQuery: '',
            mergeSearchResults: [],
            mergeSearchSelectedIds: [],
            mergeSearchLoading: false,

            init() {
                this.allCategories = Alpine.store('globals').allCategoriesFlat;
                this.groupCategoriesMap = Alpine.store('globals').groupCategoriesMap;

                // Restore last-used filters from localStorage so the table
                // comes back with the same search and filters after refresh.
                try {
                    const raw = window.localStorage.getItem('manage_products_filters');
                    if (raw) {
                        const saved = JSON.parse(raw);
                        if (saved && typeof saved === 'object') {
                            this.filterText = saved.filterText || '';
                            this.filterGroup = saved.filterGroup || '';
                            this.filterCategory = saved.filterCategory || '';
                        }
                    }
                } catch (e) {
                    console.warn('Failed to restore manage_products_filters from localStorage', e);
                }

                this.fetchProducts(1);
            },
            get availableCategories() {
                if (!this.filterGroup) return this.allCategories;
                const globalCategoriesMap = Alpine.store('globals').groupCategoriesMap;
                if (globalCategoriesMap && globalCategoriesMap[this.filterGroup]) {
                    return globalCategoriesMap[this.filterGroup] || [];
                }
                return [];
            },
            async fetchProducts(page = 1) {
                this.isLoading = true;
                // Reset selection on page change
                this.selectedIds = [];
                const params = new URLSearchParams({ page, search: this.filterText, group: this.filterGroup, category: this.filterCategory });
                try {
                    const response = await fetch(`{% url 'product:api_manage_products' %}?${params.toString()}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    const data = await response.json();
                    this.items = data.items; this.pagination = data.pagination;
                } catch (error) { console.error('Failed to fetch products:', error); }
                finally {
                    this.isLoading = false;
                    // Persist current filters so they survive a full page reload.
                    try {
                        const payload = {
                            filterText: this.filterText || '',
                            filterGroup: this.filterGroup || '',
                            filterCategory: this.filterCategory || ''
                        };
                        window.localStorage.setItem('manage_products_filters', JSON.stringify(payload));
                    } catch (e) {
                        console.warn('Failed to persist manage_products_filters to localStorage', e);
                    }
                }
            },
            clearFilters() {
                this.filterText = ''; this.filterGroup = ''; this.filterCategory = '';
                try {
                    window.localStorage.removeItem('manage_products_filters');
                } catch (e) {
                    console.warn('Failed to clear manage_products_filters from localStorage', e);
                }
                this.fetchProducts(1);
            },
            setGroupFilter(groupName) {
                this.filterGroup = groupName;
                this.filterCategory = '';
                this.fetchProducts(1);
            },
            setCategoryFilter(categoryName) {
                this.filterCategory = categoryName;
                this.fetchProducts(1);
            },
            formatPrice(value) {
                if (value === null || value === undefined) return 'N/A';
                return `RM ${Number(value).toFixed(2)}`;
            },

            // --- Selection Methods ---
            toggleAll() {
                if (this.selectedIds.length === this.items.length) {
                    this.selectedIds = [];
                } else {
                    this.selectedIds = this.items.map(item => item.id);
                }
            },
            exportSelectedPdf() {
                if (this.selectedIds.length === 0) {
                    Alpine.store('globals').showToast('No products selected', 'error');
                    return;
                }
                const ids = this.selectedIds.join(',');
                // Open the PDF view in a new tab
                const url = `{% url 'product:export_products_pdf' %}?ids=${ids}`;
                window.open(url, '_blank');
            },
            async deleteSelectedProducts() {
                if (this.selectedIds.length === 0) {
                    Alpine.store('globals').showToast('No products selected', 'error');
                    return;
                }
                const n = this.selectedIds.length;
                if (!window.confirm(`Delete ${n} product(s)? This cannot be undone.`)) {
                    return;
                }
                try {
                    const response = await fetch(`{% url 'product:api_delete_selected_products' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken,
                            'X-Requested-With': 'XMLHttpRequest',
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ ids: this.selectedIds })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        Alpine.store('globals').showToast(data.message || `Deleted ${data.deleted_count} product(s).`);
                        this.selectedIds = [];
                        const page = this.pagination.current_page || 1;
                        await this.fetchProducts(page);
                        if (this.items.length === 0 && page > 1) {
                            await this.fetchProducts(page - 1);
                        }
                    } else {
                        Alpine.store('globals').showToast(data.error || 'Delete failed.', 'error');
                    }
                } catch (err) {
                    console.error('Delete products failed:', err);
                    Alpine.store('globals').showToast('Network error while deleting products.', 'error');
                }
            },

            // --- Product Cleaning / Merge Tools ---
            openMergeTools() {
                this.showMergeToolsModal = true;
                this.mergeSearch = this.filterText || '';
                this.loadMergeSuggestions();
            },
            closeMergeTools() {
                this.showMergeToolsModal = false;
                this.mergeGroups = [];
                this.mergeIsLoading = false;
                this.mergeSearchQuery = '';
                this.mergeSearchResults = [];
                this.mergeSearchSelectedIds = [];
            },
            async loadMergeSuggestions() {
                this.mergeIsLoading = true;
                this.mergeGroups = [];
                const params = new URLSearchParams({
                    search: this.mergeSearch || '',
                    min_score: '0.7',
                    limit: '200'
                });
                try {
                    const response = await fetch(`{% url 'product:api_product_merge_suggestions' %}?${params.toString()}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    const data = await response.json();
                    const groups = data.groups || [];
                    this.mergeGroups = groups.map(g => ({
                        ...g,
                        primary_id: g.products[0]?.id || null,
                        isMerging: false,
                    }));
                } catch (err) {
                    console.error('Failed to load merge suggestions:', err);
                    Alpine.store('globals').showToast('Could not load duplicate suggestions.', 'error');
                } finally {
                    this.mergeIsLoading = false;
                }
            },
            async loadMergeSearch() {
                const q = (this.mergeSearchQuery || '').trim();
                if (!q) {
                    this.mergeSearchResults = [];
                    return;
                }
                this.mergeSearchLoading = true;
                try {
                    const params = new URLSearchParams({ search: q, limit: '50' });
                    const response = await fetch(`{% url 'product:api_product_search' %}?${params.toString()}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    const data = await response.json();
                    this.mergeSearchResults = data.products || [];
                } catch (err) {
                    console.error('Merge search failed:', err);
                    this.mergeSearchResults = [];
                } finally {
                    this.mergeSearchLoading = false;
                }
            },
            toggleMergeSearchSelection(id) {
                if (this.mergeSearchSelectedIds.includes(id)) {
                    this.mergeSearchSelectedIds = this.mergeSearchSelectedIds.filter(i => i !== id);
                } else {
                    this.mergeSearchSelectedIds = [...this.mergeSearchSelectedIds, id];
                }
            },
            createCustomMergeGroup() {
                if (this.mergeSearchSelectedIds.length < 2) {
                    Alpine.store('globals').showToast('Select at least two products to create a merge group.', 'error');
                    return;
                }
                const products = this.mergeSearchResults.filter(p => this.mergeSearchSelectedIds.includes(p.id));
                if (products.length < 2) {
                    Alpine.store('globals').showToast('Select at least two products from the search results.', 'error');
                    return;
                }
                const groupId = 'manual-' + Date.now();
                this.mergeGroups = [...this.mergeGroups, {
                    group_id: groupId,
                    products: products,
                    primary_id: products[0].id,
                    isMerging: false,
                }];
                this.mergeSearchSelectedIds = [];
                Alpine.store('globals').showToast('Custom merge group created. Choose the master and click Merge into master.');
            },
            removeProductFromGroup(group, productId) {
                const products = (group.products || []).filter(p => p.id !== productId);
                group.products = products;
                if (group.primary_id === productId) {
                    group.primary_id = products.length ? products[0].id : null;
                }
                if (products.length <= 1) {
                    this.mergeGroups = this.mergeGroups.filter(g => g.group_id !== group.group_id);
                    if (products.length === 1) {
                        Alpine.store('globals').showToast('Group removed (only one product left).');
                    }
                    return;
                }
                const fullGroupIds = (group.products || []).map(p => p.id).concat([productId]);
                if (fullGroupIds.length >= 2) {
                    fetch(`{% url 'product:api_ignore_merge_suggestion' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken,
                            'X-Requested-With': 'XMLHttpRequest',
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ product_ids: fullGroupIds })
                    }).then(r => r.json()).catch(() => {});
                }
            },
            async dismissGroup(group) {
                const ids = (group.products || []).map(p => p.id);
                if (!ids.length) return;
                try {
                    const response = await fetch(`{% url 'product:api_ignore_merge_suggestion' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken,
                            'X-Requested-With': 'XMLHttpRequest',
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ product_ids: ids })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.mergeGroups = this.mergeGroups.filter(g => g.group_id !== group.group_id);
                        Alpine.store('globals').showToast('Group dismissed. It will not appear again unless the set of products changes.');
                    } else {
                        Alpine.store('globals').showToast(data.error || 'Could not dismiss.', 'error');
                    }
                } catch (err) {
                    console.error('Dismiss failed:', err);
                    Alpine.store('globals').showToast('Network error.', 'error');
                }
            },
            async mergeGroup(group) {
                const mergeIds = (group.products || []).filter(p => p.id !== group.primary_id).map(p => p.id);
                if (!group.primary_id || !mergeIds.length) {
                    Alpine.store('globals').showToast('Choose the master product; at least one other product in the group is required to merge.', 'error');
                    return;
                }
                group.isMerging = true;
                try {
                    const response = await fetch(`{% url 'product:api_merge_products' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken,
                            'X-Requested-With': 'XMLHttpRequest',
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            primary_id: group.primary_id,
                            merge_ids: mergeIds
                        })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        Alpine.store('globals').showToast('Products merged successfully.');
                        // Remove this group from the list
                        this.mergeGroups = this.mergeGroups.filter(g => g.group_id !== group.group_id);
                        // Refresh product table so data stays in sync
                        this.fetchProducts(1);
                    } else {
                        Alpine.store('globals').showToast(data.error || 'Merge failed.', 'error');
                    }
                } catch (err) {
                    console.error('Merge error:', err);
                    Alpine.store('globals').showToast('Network error while merging products.', 'error');
                } finally {
                    group.isMerging = false;
                }
            }
        }));

        Alpine.data('inventoryTableData', () => ({
            items: [],
            isLoading: true,
            pagination: {},
            filterText: '',
            filterGroup: '',
            filterCategory: '',
            allCategories: [],
            groupCategoriesMap: {},
            init() {
                this.allCategories = Alpine.store('globals').allCategoriesFlat;
                this.groupCategoriesMap = Alpine.store('globals').groupCategoriesMap;
                this.fetchInventory(1);
            },
            get availableCategories() {
                if (!this.filterGroup) return this.allCategories;
                const globalCategoriesMap = Alpine.store('globals').groupCategoriesMap;
                if (globalCategoriesMap && globalCategoriesMap[this.filterGroup]) {
                    return globalCategoriesMap[this.filterGroup] || [];
                }
                return [];
            },
            async fetchInventory(page = 1) {
                this.isLoading = true;
                const params = new URLSearchParams({ page, search: this.filterText, group: this.filterGroup, category: this.filterCategory });
                try {
                    const response = await fetch(`{% url 'inventory:api_manage_inventory' %}?${params.toString()}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    const data = await response.json();
                    this.items = data.items; this.pagination = data.pagination;
                } catch (error) { console.error('Failed to fetch inventory:', error); }
                finally { this.isLoading = false; }
            },
            clearFilters() {
                this.filterText = ''; this.filterGroup = ''; this.filterCategory = ''; this.fetchInventory(1);
            },
            setGroupFilter(groupName) {
                this.filterGroup = groupName; this.filterCategory = ''; this.fetchInventory(1);
            },
            setCategoryFilter(categoryName) {
                this.filterCategory = categoryName;
                this.fetchInventory(1);
            },
            formatPrice(value) {
                if (value === null || value === undefined) return 'N/A';
                return `RM ${Number(value).toFixed(2)}`;
            }
        }));

        Alpine.data('quotationsTableData', () => ({
            items: [],
            isLoading: true,
            pagination: {},
            filterText: '',
            init() { this.fetchQuotations(1); },
            async fetchQuotations(page = 1) {
                this.isLoading = true;
                const params = new URLSearchParams({ page, search: this.filterText });
                try {
                    const response = await fetch(`{% url 'inventory:api_manage_quotations' %}?${params.toString()}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    const data = await response.json();
                    this.items = data.items; this.pagination = data.pagination;
                } catch (error) { console.error('Failed to fetch quotations:', error); }
                finally { this.isLoading = false; }
            },
            clearFilters() { this.filterText = ''; this.fetchQuotations(1); },
            formatPrice(value) {
                if (value === null || value === undefined) return 'N/A';
                return `RM ${Number(value).toFixed(2)}`;
            }
        }));

        Alpine.data('imageTabManager', () => ({
            isLoading: true,
            init() {
                if (Alpine.store('images').galleryImages.length > 0) {
                    this.isLoading = false;
                    return; // Already loaded
                }
                this.fetchInitialImageData();
            },
            async fetchInitialImageData() {
                this.isLoading = true;
                const apiHeaders = { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' };
                try {
                    const [imagesRes, productsRes, postsRes] = await Promise.all([
                        fetch(`{% url 'images:ajax_get_images' %}`, { headers: apiHeaders }),
                        fetch(`{% url 'product:api_manage_products' %}?page=1&limit=10000`, { headers: apiHeaders }),
                        fetch(`{% url 'blog:api_manage_posts' %}?page=1&limit=10000`, { headers: apiHeaders })
                    ]);

                    if (!imagesRes.ok || !productsRes.ok || !postsRes.ok) {
                        throw new Error('One or more API requests failed');
                    }
                    const imagesData = await imagesRes.json();
                    const productsData = await productsRes.json();
                    const postsData = await postsRes.json();
                    Alpine.store('images').galleryImages = imagesData.images;
                    Alpine.store('images').allProducts = productsData.items;
                    Alpine.store('images').allPosts = postsData.items;
                    Alpine.store('globals').allImageCategories = imagesData.categories;
                } catch (error) {
                    console.error('Failed to load initial image data:', error);
                    Alpine.store('globals').showToast('Could not load image gallery data.', 'error');
                } finally {
                    this.isLoading = false;
                }
            }
        }));

    });
</script>
