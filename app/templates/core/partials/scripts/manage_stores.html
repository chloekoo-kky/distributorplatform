<script>
    document.addEventListener('alpine:init', () => {
        // --- 1. Global Store ---
        Alpine.store('globals', {
            // Added safety checks for all JSON data sources
            allCategoriesFlat: document.getElementById('all-categories-data') ? JSON.parse(document.getElementById('all-categories-data').textContent) : [],
            groupCategoriesMap: document.getElementById('group-categories-data') ? JSON.parse(document.getElementById('group-categories-data').textContent) : {},
            allCategoriesList: document.getElementById('all-categories-list-data') ? JSON.parse(document.getElementById('all-categories-list-data').textContent) : [],
            allSuppliersList: document.getElementById('all-suppliers-list-data') ? JSON.parse(document.getElementById('all-suppliers-list-data').textContent) : [],
            allImageCategories: document.getElementById('all-image-categories-data') ? JSON.parse(document.getElementById('all-image-categories-data').textContent) : [],
            allUserGroupsList: document.getElementById('all-user-groups-data') ? JSON.parse(document.getElementById('all-user-groups-data').textContent) : [],
            allBanners: document.getElementById('all-banners-data') ? JSON.parse(document.getElementById('all-banners-data').textContent) : [],

            csrfToken: '{{ csrf_token }}', // Ensure this is populated if not handled elsewhere
            selectedCategoryId: null,
            invoiceToOpen: null,

            // --- HELPER: Toast Message ---
            showToast(message, icon = 'success') {
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        text: message,
                        icon: icon,
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        timerProgressBar: true
                    });
                } else {
                    // Fallback if SweetAlert2 is not loaded
                    console.log(`[${icon}] ${message}`);
                }
            }
        });

        console.log('[Globals] allUserGroupsList', Alpine.store('globals').allUserGroupsList);

        // --- 2. Global Store for Image Management ---
        Alpine.store('images', {
            galleryImages: [],
            /** Paginated manage gallery: { page, page_size, total, total_pages } */
            imagesPagination: { page: 1, page_size: 48, total: 0, total_pages: 0 },
            galleryListLoading: false,
            allProducts: [],
            allPosts: [],
            selectedImageToAssign: null,
            bulkSelectedImageIds: [],
            lastSelectedIndex: null,

            // Auto-assign state
            showAutoAssignModal: false,
            autoAssignMatches: [],
            isSubmittingAutoAssign: false,

            // Modal States
            showAssignProductModal: false,
            assignProductModalSearchTerm: '',
            assignProductModalSelectedProducts: [],
            assignProductModalAssignmentType: 'featured',
            assignProductModalIsSubmitting: false,

            showAssignPostModal: false,
            assignPostModalSearchTerm: '',
            assignPostModalSelectedPosts: [],
            assignPostModalAssignmentType: 'featured',
            assignPostModalIsSubmitting: false,

            showBulkAssignModal: false,
            bulkAssignTargetType: 'product',
            bulkAssignSearchTerm: '',
            bulkAssignTargetId: null,
            bulkAssignIsSubmitting: false,

            showImageEditModal: false,
            isSubmittingImageEdit: false,
            currentImageToEdit: { id: null, title: '', alt_text: '', category_id: null, url: '' },

            showImageUploadConfirmModal: false,
            imageUploadPreviewList: [],
            imageUploadIsConfirming: false,

            // --- Getters ---
            /** Current page of images (server-filtered by category). */
            get filteredImages() {
                return this.galleryImages;
            },
            get paginationRangeStart() {
                const p = this.imagesPagination;
                if (!p || !p.total) return 0;
                return (p.page - 1) * p.page_size + 1;
            },
            get paginationRangeEnd() {
                const p = this.imagesPagination;
                if (!p || !p.total) return 0;
                return Math.min(p.page * p.page_size, p.total);
            },
            get filteredProductsForModal() {
                if (!this.assignProductModalSearchTerm) return this.allProducts;
                const search = this.assignProductModalSearchTerm.toLowerCase();
                return this.allProducts.filter(p => p.name.toLowerCase().includes(search) || (p.sku && p.sku.toLowerCase().includes(search)));
            },
            get filteredPostsForModal() {
                if (!this.assignPostModalSearchTerm) return this.allPosts;
                const search = this.assignPostModalSearchTerm.toLowerCase();
                return this.allPosts.filter(p => p.title.toLowerCase().includes(search));
            },
            get filteredProductsForBulkAssign() {
                if (!this.bulkAssignSearchTerm) return this.allProducts;
                const search = this.bulkAssignSearchTerm.toLowerCase();
                return this.allProducts.filter(p => p.name.toLowerCase().includes(search) || (p.sku && p.sku.toLowerCase().includes(search)));
            },
            get filteredPostsForBulkAssign() {
                if (!this.bulkAssignSearchTerm) return this.allPosts;
                const search = this.bulkAssignSearchTerm.toLowerCase();
                return this.allPosts.filter(p => p.title.toLowerCase().includes(search));
            },

            async fetchGalleryPage(page) {
                const globals = Alpine.store('globals');
                const cat = globals.selectedCategoryId;
                const ps = this.imagesPagination.page_size || 48;
                const params = new URLSearchParams({ page: String(page), page_size: String(ps) });
                if (cat != null && cat !== '') {
                    params.set('category_id', String(cat));
                }
                this.galleryListLoading = true;
                try {
                    const res = await fetch(`{% url 'images:ajax_get_images' %}?${params}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    if (!res.ok) {
                        throw new Error('Failed to load images');
                    }
                    const data = await res.json();
                    this.galleryImages = data.images || [];
                    if (data.pagination) {
                        this.imagesPagination = {
                            page: data.pagination.page,
                            page_size: data.pagination.page_size,
                            total: data.pagination.total,
                            total_pages: data.pagination.total_pages,
                        };
                    }
                    if (data.categories && data.categories.length) {
                        globals.allImageCategories = data.categories;
                    }
                } finally {
                    this.galleryListLoading = false;
                }
            },
            async setGalleryPageSize(size) {
                const n = parseInt(size, 10);
                if (Number.isNaN(n)) return;
                this.imagesPagination.page_size = Math.min(100, Math.max(1, n));
                await this.fetchGalleryPage(1);
            },
            async refetchGalleryAfterMutation() {
                let p = this.imagesPagination.page;
                await this.fetchGalleryPage(p);
                if (this.galleryImages.length === 0 && p > 1) {
                    await this.fetchGalleryPage(p - 1);
                }
            },

            // --- Methods ---
            handleImageCheckboxClick(event, imageId, index) {
                // Shift+Click: add the full range between lastSelectedIndex and this index.
                // Let x-model handle the individual checkbox toggle; we just augment the selection.
                if (event.shiftKey && this.lastSelectedIndex !== null) {
                    const start = Math.min(this.lastSelectedIndex, index);
                    const end = Math.max(this.lastSelectedIndex, index);
                    const filtered = this.filteredImages || [];
                    const range = filtered.slice(start, end + 1);
                    const rangeIds = range.map(img => String(img.id));
                    const currentIds = this.bulkSelectedImageIds.map(id => String(id));
                    const merged = new Set([...currentIds, ...rangeIds]);
                    this.bulkSelectedImageIds = Array.from(merged);
                }
                // For normal clicks, x-model will toggle the checkbox and update bulkSelectedImageIds.
                this.lastSelectedIndex = index;
            },
            formatImageTitle(name) {
                if (!name || typeof name !== 'string') return name || '';
                let s = name.replace(/_/g, ' ').trim();
                s = s.replace(/([a-z0-9])([A-Z])/g, '$1 $2');
                return s.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.slice(1).toLowerCase()).trim();
            },
            handleImageUpload(event) {
                event.preventDefault();
                const form = event.target;
                const fileInput = form.querySelector('input[type=file]');
                const files = fileInput && fileInput.files;
                if (!files || !files.length) {
                    Alpine.store('globals').showToast('Please select one or more images.', 'warning');
                    return;
                }
                const previewList = [];
                for (let i = 0; i < files.length; i++) {
                    const baseName = files[i].name.replace(/\.[^/.]+$/, '');
                    previewList.push({
                        filename: files[i].name,
                        formattedTitle: this.formatImageTitle(baseName)
                    });
                }
                this.imageUploadPreviewList = previewList;
                this.showImageUploadConfirmModal = true;
            },
            cancelImageUploadConfirm() {
                this.showImageUploadConfirmModal = false;
                this.imageUploadPreviewList = [];
            },
            async confirmImageUpload() {
                if (this.imageUploadIsConfirming) return;
                const form = document.getElementById('image-upload-form');
                if (!form || !this.imageUploadPreviewList.length) return;

                this.imageUploadIsConfirming = true;
                const formData = new FormData(form);
                formData.append('image_titles', JSON.stringify(this.imageUploadPreviewList.map(p => p.formattedTitle)));

                try {
                    const response = await fetch(`{% url 'images:ajax_upload_image' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                            'Accept': 'application/json'
                        },
                        body: formData
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        form.reset();
                        this.showImageUploadConfirmModal = false;
                        this.imageUploadPreviewList = [];
                        Alpine.store('globals').showToast('Image(s) uploaded successfully!');
                        await this.fetchGalleryPage(1);
                    } else { throw new Error(data.errors || 'Upload failed'); }
                } catch (err) {
                    Alpine.store('globals').showToast('Upload error: ' + err.message, 'error');
                } finally {
                    this.imageUploadIsConfirming = false;
                }
            },

            async deleteImage(imageId) {
                if (!confirm('Are you sure you want to delete this image?')) return;
                try {
                    const response = await fetch(`/images/api/delete-image/${imageId}/`, {
                        method: 'POST',
                        headers: {
                             'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                             'Accept': 'application/json'
                        }
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        await this.refetchGalleryAfterMutation();
                        Alpine.store('globals').showToast(data.message);
                    } else { throw new Error(data.error || 'Failed to delete'); }
                } catch (err) {
                    Alpine.store('globals').showToast('Delete error: ' + err.message, 'error');
                }
            },

            async deleteSelectedImages() {
                if (!this.bulkSelectedImageIds.length) {
                    Alpine.store('globals').showToast('No images selected to delete.', 'warning');
                    return;
                }
                if (!confirm(`Delete ${this.bulkSelectedImageIds.length} selected image(s)? This cannot be undone.`)) {
                    return;
                }
                try {
                    const response = await fetch(`{% url 'images:ajax_bulk_delete_images' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                            'Accept': 'application/json',
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify({ image_ids: this.bulkSelectedImageIds })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        const deleted = data.deleted_ids || [];
                        if (deleted.length) {
                            this.bulkSelectedImageIds = this.bulkSelectedImageIds.filter(id => !deleted.includes(id));
                            await this.refetchGalleryAfterMutation();
                        }
                        this.lastSelectedIndex = null;
                        let msg = data.message || `Deleted ${deleted.length} image(s).`;
                        if (data.protected_ids && data.protected_ids.length) {
                            msg += ' Some images could not be deleted because they are in use.';
                        }
                        Alpine.store('globals').showToast(msg);
                    } else {
                        Alpine.store('globals').showToast(data.error || 'Failed to delete images.', 'error');
                    }
                } catch (err) {
                    Alpine.store('globals').showToast('Delete error: ' + err.message, 'error');
                }
            },

            // ... (Rest of methods remain unchanged) ...

            openAssignProductModal(image) {
                this.selectedImageToAssign = image;
                this.assignProductModalSearchTerm = '';
                this.assignProductModalAssignmentType = 'featured';
                this.updateProductModalSelections();
                this.showAssignProductModal = true;
            },
            updateProductModalSelections() {
                if (!this.selectedImageToAssign) return;
                const imageId = this.selectedImageToAssign.id;
                if (this.assignProductModalAssignmentType === 'featured') {
                    this.assignProductModalSelectedProducts = this.allProducts
                        .filter(p => p.featured_image_id === imageId).map(p => p.id);
                } else {
                    this.assignProductModalSelectedProducts = this.allProducts
                        .filter(p => p.gallery_image_ids.includes(imageId)).map(p => p.id);
                }
            },
            async submitProductAssignment() {
                this.assignProductModalIsSubmitting = true;
                const payload = {
                    image_id: this.selectedImageToAssign.id,
                    product_ids: this.assignProductModalSelectedProducts,
                    assignment_type: this.assignProductModalAssignmentType
                };
                try {
                    const response = await fetch(`{% url 'images:ajax_assign_to_products' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                            'Accept': 'application/json', 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.allProducts = data.all_products; // Update local state
                        this.showAssignProductModal = false;
                        Alpine.store('globals').showToast('Product assignments updated!');
                        window.dispatchEvent(new CustomEvent('refresh-data', { detail: { tab: 'products' } }));
                        await this.fetchGalleryPage(this.imagesPagination.page);
                    } else { throw new Error(data.error || 'Failed to save'); }
                } catch (err) {
                    Alpine.store('globals').showToast('Error: ' + err.message, 'error');
                }
                finally { this.assignProductModalIsSubmitting = false; }
            },
            openAssignPostModal(image) {
                this.selectedImageToAssign = image;
                this.assignPostModalSearchTerm = '';
                this.assignPostModalAssignmentType = 'featured';
                this.updatePostModalSelections();
                this.showAssignPostModal = true;
            },
            updatePostModalSelections() {
                if (!this.selectedImageToAssign) return;
                const imageId = this.selectedImageToAssign.id;
                if (this.assignPostModalAssignmentType === 'featured') {
                    this.assignPostModalSelectedPosts = this.allPosts
                        .filter(p => p.featured_image_id === imageId).map(p => p.id);
                } else {
                    this.assignPostModalSelectedPosts = this.allPosts
                        .filter(p => p.gallery_image_ids.includes(imageId)).map(p => p.id);
                }
            },
            async submitPostAssignment() {
                this.assignPostModalIsSubmitting = true;
                const payload = {
                    image_id: this.selectedImageToAssign.id,
                    post_ids: this.assignPostModalSelectedPosts,
                    assignment_type: this.assignPostModalAssignmentType
                };
                try {
                    const response = await fetch(`{% url 'images:ajax_assign_to_posts' %}`, {
                        method: 'POST',
                        headers: {
                             'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                             'Accept': 'application/json', 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.allPosts = data.all_posts;
                        this.showAssignPostModal = false;
                        Alpine.store('globals').showToast('Post assignments updated!');
                        await this.fetchGalleryPage(this.imagesPagination.page);
                    } else { throw new Error(data.error || 'Failed to save'); }
                } catch (err) {
                    Alpine.store('globals').showToast('Error: ' + err.message, 'error');
                }
                finally { this.assignPostModalIsSubmitting = false; }
            },
            openBulkAssignModal() {
                if (this.bulkSelectedImageIds.length === 0) {
                    Alpine.store('globals').showToast('Please select one or more images first.', 'warning');
                    return;
                }
                this.bulkAssignTargetType = 'product';
                this.bulkAssignSearchTerm = '';
                this.bulkAssignTargetId = null;
                this.showBulkAssignModal = true;
            },
            async submitBulkAssignment() {
                if (this.bulkAssignIsSubmitting || !this.bulkAssignTargetId || this.bulkSelectedImageIds.length === 0) return;
                this.bulkAssignIsSubmitting = true;
                const payload = {
                    image_ids: this.bulkSelectedImageIds,
                    target_id: this.bulkAssignTargetId,
                    target_type: this.bulkAssignTargetType
                };
                try {
                    const response = await fetch(`{% url 'images:ajax_bulk_assign' %}`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                            'Accept': 'application/json', 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.allProducts = data.all_products;
                        this.allPosts = data.all_posts;
                        this.showBulkAssignModal = false;
                        this.bulkSelectedImageIds = [];
                        this.lastSelectedIndex = null;
                        Alpine.store('globals').showToast('Images successfully assigned to gallery!');
                        await this.fetchGalleryPage(this.imagesPagination.page);
                    } else { throw new Error(data.error || 'Failed to save'); }
                } catch (err) {
                    Alpine.store('globals').showToast('Error: ' + err.message, 'error');
                }
                finally { this.bulkAssignIsSubmitting = false; }
            },
            async openAutoAssignModal() {
                if (this.bulkSelectedImageIds.length === 0) {
                    Alpine.store('globals').showToast('Please select one or more images first.', 'warning');
                    return;
                }

                const idList = this.bulkSelectedImageIds.map((id) => parseInt(id, 10)).filter((n) => !Number.isNaN(n));
                let imagesMap = {};
                try {
                    const res = await fetch(`{% url 'images:ajax_get_images' %}?ids=${idList.join(',')}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
                    });
                    if (!res.ok) {
                        throw new Error('Failed to load selected images');
                    }
                    const payload = await res.json();
                    (payload.images || []).forEach((img) => { imagesMap[img.id] = img; });
                } catch (e) {
                    Alpine.store('globals').showToast('Could not load selected images for auto-assign.', 'error');
                    return;
                }

                const products = this.allProducts || [];
                const matches = [];
                const normalize = (value) => (value || '').toString().toLowerCase();

                this.bulkSelectedImageIds.forEach((imageId) => {
                    const img = imagesMap[parseInt(imageId, 10)] || imagesMap[imageId];
                    if (!img) {
                        return;
                    }
                    const title = normalize(img.title);
                    let bestMatch = products.find(p => {
                        const sku = normalize(p.sku);
                        return sku && (title === sku || title.includes(sku) || sku.includes(title));
                    }) || null;
                    if (!bestMatch) {
                        bestMatch = products.find(p => {
                            const name = normalize(p.name);
                            return name && (title.includes(name) || name.includes(title));
                        }) || null;
                    }
                    matches.push({ image: img, product: bestMatch, selected: !!bestMatch });
                });

                this.autoAssignMatches = matches;
                this.showAutoAssignModal = true;
            },
            async submitAutoAssign() {
                if (this.isSubmittingAutoAssign) return;

                const chosen = (this.autoAssignMatches || []).filter(m => m.selected && m.product);
                if (chosen.length === 0) {
                    Alpine.store('globals').showToast('Please select at least one match to auto-assign.', 'warning');
                    return;
                }

                this.isSubmittingAutoAssign = true;

                const payload = {
                    assignments: chosen.map(m => ({
                        image_id: m.image.id,
                        product_id: m.product.id
                    }))
                };

                try {
                    const response = await fetch(`/images/api/bulk-auto-assign/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                            'Accept': 'application/json',
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();

                    if (response.ok && data.success) {
                        if (Array.isArray(data.all_products)) {
                            this.allProducts = data.all_products;
                        }
                        this.showAutoAssignModal = false;
                        this.autoAssignMatches = [];
                        this.bulkSelectedImageIds = [];
                        this.lastSelectedIndex = null;
                        Alpine.store('globals').showToast('Featured images auto-assigned successfully!');
                        window.dispatchEvent(new CustomEvent('refresh-data', { detail: { tab: 'products' } }));
                        await this.fetchGalleryPage(this.imagesPagination.page);
                    } else {
                        throw new Error(data.error || 'Failed to auto-assign featured images.');
                    }
                } catch (err) {
                    Alpine.store('globals').showToast('Error: ' + err.message, 'error');
                } finally {
                    this.isSubmittingAutoAssign = false;
                }
            },
            openImageEditModal(image) {
                this.currentImageToEdit = { ...image };
                this.isSubmittingImageEdit = false;
                this.showImageEditModal = true;
            },
            async submitImageEdit() {
                if (this.isSubmittingImageEdit) return;
                this.isSubmittingImageEdit = true;
                const payload = {
                    title: this.currentImageToEdit.title,
                    alt_text: this.currentImageToEdit.alt_text,
                    category_id: this.currentImageToEdit.category_id
                };
                try {
                    const response = await fetch(`/images/api/edit-image/${this.currentImageToEdit.id}/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': Alpine.store('globals').csrfToken || document.querySelector('[name=csrfmiddlewaretoken]').value,
                            'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        this.showImageEditModal = false;
                        Alpine.store('globals').showToast('Image updated successfully!');
                        await this.fetchGalleryPage(this.imagesPagination.page);
                    } else { throw new Error(data.error || 'Failed to update image.'); }
                } catch (err) {
                    Alpine.store('globals').showToast('Error: ' + err.message, 'error');
                }
                finally { this.isSubmittingImageEdit = false; }
            }
        });
    });
</script>
