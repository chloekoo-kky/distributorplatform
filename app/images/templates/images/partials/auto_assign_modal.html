<div
    x-show="$store.images.showAutoAssignModal"
    x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
>
    <div
        class="bg-white rounded-lg shadow-xl max-w-4xl w-full mx-4 flex flex-col max-h-[80vh]"
        @click.away="$store.images.showAutoAssignModal = false"
    >
        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-900">
                Auto-Assign Images to Products
            </h3>
            <button
                type="button"
                class="text-gray-400 hover:text-gray-600"
                @click="$store.images.showAutoAssignModal = false"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="px-6 py-4 overflow-y-auto flex-1">
            <template x-if="$store.images.autoAssignMatches.length === 0">
                <p class="text-sm text-gray-500">
                    No matching products found for the selected images, or gallery data may need to be refreshed.
                </p>
            </template>

            <template x-if="$store.images.autoAssignMatches.length > 0">
                <div class="space-y-3">
                    <template x-for="(match, index) in $store.images.autoAssignMatches" :key="match.image.id">
                        <div class="flex items-center justify-between border border-gray-200 rounded-md p-3">
                            <!-- Left: Checkbox + Image -->
                            <div class="flex items-center space-x-3">
                                <input
                                    type="checkbox"
                                    class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
                                    x-model="match.selected"
                                    :disabled="!match.product"
                                >
                                <div class="flex items-center space-x-3">
                                    <div class="w-16 h-16 rounded-md overflow-hidden bg-gray-100 flex items-center justify-center border border-gray-200">
                                        <img
                                            :src="match.image.url"
                                            :alt="match.image.alt_text || match.image.title"
                                            class="w-full h-full object-cover"
                                        >
                                    </div>
                                    <div>
                                        <p class="text-sm font-medium text-gray-900" x-text="match.image.title"></p>
                                        <p class="text-xs text-gray-500" x-text="match.image.category_name || 'Uncategorized'"></p>
                                    </div>
                                </div>
                            </div>

                            <!-- Middle: Arrow -->
                            <div class="flex items-center justify-center px-4 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M9 5l7 7-7 7"/>
                                </svg>
                            </div>

                            <!-- Right: Product Match -->
                            <div class="flex-1">
                                <template x-if="match.product">
                                    <div>
                                        <p class="text-sm font-semibold text-gray-900" x-text="match.product.name"></p>
                                        <p class="text-xs text-gray-500">
                                            SKU:
                                            <span x-text="match.product.sku || '-'"></span>
                                        </p>
                                    </div>
                                </template>
                                <template x-if="!match.product">
                                    <p class="text-sm text-red-500 italic">
                                        No matching product found
                                    </p>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
            <p class="text-xs text-gray-500">
                Only rows with a matched product and a checked checkbox will be updated.
            </p>
            <div class="space-x-3">
                <button
                    type="button"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                    @click="$store.images.showAutoAssignModal = false"
                    :disabled="$store.images.isSubmittingAutoAssign"
                >
                    Cancel
                </button>
                <button
                    type="button"
                    class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-green-600 border border-transparent rounded-md hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed"
                    @click="$store.images.submitAutoAssign()"
                    :disabled="$store.images.isSubmittingAutoAssign || !$store.images.autoAssignMatches.some(m => m.selected && m.product)"
                >
                    <svg
                        x-show="$store.images.isSubmittingAutoAssign"
                        class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                    >
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor"
                              d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                    </svg>
                    <span x-text="$store.images.isSubmittingAutoAssign ? 'Assigning...' : 'Confirm Auto-Assign'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
