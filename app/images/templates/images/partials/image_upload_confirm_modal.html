{# Image upload confirmation: preview formatted file names (editable) before uploading #}
<div x-show="$store.images.showImageUploadConfirmModal" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 flex flex-col max-h-[85vh]"
         @click.away="$store.images.cancelImageUploadConfirm()">
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-900">Confirm image names</h3>
            <button type="button" class="text-gray-400 hover:text-gray-600"
                    @click="$store.images.cancelImageUploadConfirm()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="px-6 py-4 overflow-y-auto flex-1">
            <p class="text-sm text-gray-600 mb-4">
                File names have been formatted (underscores → spaces, PascalCase → Title Case). You can edit the image title for each file before uploading.
            </p>
            <div class="border border-gray-200 rounded-md overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">File name</th>
                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Image title</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="(item, index) in $store.images.imageUploadPreviewList" :key="index">
                            <tr>
                                <td class="px-3 py-2 whitespace-nowrap text-gray-600 text-xs" x-text="item.filename"></td>
                                <td class="px-3 py-2">
                                    <input type="text"
                                           x-model="item.formattedTitle"
                                           class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
            <button type="button"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                    @click="$store.images.cancelImageUploadConfirm()"
                    :disabled="$store.images.imageUploadIsConfirming">
                Cancel
            </button>
            <button type="button"
                    class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
                    @click="$store.images.confirmImageUpload()"
                    :disabled="$store.images.imageUploadIsConfirming">
                <svg x-show="$store.images.imageUploadIsConfirming" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
                     xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                </svg>
                <span x-text="$store.images.imageUploadIsConfirming ? 'Uploading...' : 'Confirm and upload'"></span>
            </button>
        </div>
    </div>
</div>
