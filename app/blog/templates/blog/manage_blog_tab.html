<div x-data="blogTabManager()" x-init="init()">

    {# --- Header --- #}
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-semibold text-gray-700">Manage Blog Posts</h3>
        <div class="flex items-center gap-4">
            <div class="w-64">
                <input type="text" x-model.debounce.500ms="search" placeholder="Search by title..."
                       class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="button" @click="openBlogModal()" class="px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex items-center shrink-0">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Create New Post
            </button>
        </div>
    </div>

    {# --- Loading State --- #}
    <div x-show="isLoading" class="p-12 text-center bg-white rounded-lg shadow-sm border border-gray-100">
        <svg class="animate-spin h-8 w-8 text-indigo-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <span class="text-gray-500">Loading posts...</span>
    </div>

    {# --- Card Grid --- #}
    <div x-show="!isLoading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        <template x-if="items.length === 0">
            <div class="col-span-full text-center text-gray-500 py-10 bg-white rounded-lg shadow-sm border border-gray-100">
                No blog posts found.
            </div>
        </template>

        <template x-for="post in items" :key="post.id">
            <div class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow duration-200 border border-gray-100 flex flex-col overflow-hidden">
                {# Featured image #}
                <div class="relative h-40 bg-gray-100">
                    <template x-if="post.featured_image_url">
                        <img :src="post.featured_image_url" :alt="post.title" class="w-full h-full object-cover">
                    </template>
                    <template x-if="!post.featured_image_url">
                        <div class="flex items-center justify-center h-full text-gray-300">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                    </template>
                    <span class="absolute top-2 right-2 px-2 py-0.5 text-xs font-semibold rounded-full shadow-sm"
                          :class="post.status === 'PUBLISHED' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'"
                          x-text="post.status === 'PUBLISHED' ? 'Published' : 'Draft'">
                    </span>
                </div>

                <div class="p-4 flex-1 flex flex-col">
                    <h4 class="text-base font-semibold text-gray-900 leading-snug line-clamp-2 mb-2" x-text="post.title"></h4>

                    <p class="text-xs text-gray-500 mb-1">
                        <span x-text="post.author"></span>
                        <span class="text-gray-300 mx-1">·</span>
                        <span x-text="post.created_at"></span>
                    </p>

                    <p class="text-xs text-gray-500 mb-4 line-clamp-1">
                        <template x-if="post.is_public">
                            <span>Public</span>
                        </template>
                        <template x-if="!post.is_public">
                            <span x-text="post.user_groups.join(', ') || 'Restricted'"></span>
                        </template>
                    </p>

                    <div class="mt-auto flex items-center justify-end gap-1.5">
                        <button type="button"
                                @click="openBlogModal(post.id)"
                                class="inline-flex items-center justify-center p-1.5 border border-gray-300 rounded-md text-gray-600 bg-white hover:bg-gray-50 hover:text-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                title="Edit post"
                                aria-label="Edit post">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                        </button>

                        <a :href="post.view_url" target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center justify-center p-1.5 border border-gray-300 rounded-md text-gray-600 bg-white hover:bg-gray-50 hover:text-blue-600 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           title="View post"
                           aria-label="View post">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                            </svg>
                        </a>

                        <form :action="post.delete_url" method="POST" class="inline-flex"
                              onsubmit="return confirm('Are you sure you want to delete this post?');">
                            {% csrf_token %}
                            <button type="submit"
                                    class="inline-flex items-center justify-center p-1.5 border border-gray-300 rounded-md text-rose-600 bg-white hover:bg-rose-50 hover:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-500"
                                    title="Delete post"
                                    aria-label="Delete post">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </template>
    </div>

    {# --- Pagination --- #}
    <div x-show="!isLoading && items.length > 0" class="mt-6 p-4 bg-white rounded-lg shadow-sm border border-gray-100 flex items-center justify-between">
        <button @click="fetchPosts(pagination.current_page - 1)" :disabled="!pagination.has_previous"
                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
            Previous
        </button>
        <span class="text-sm text-gray-700">
            Page <span x-text="pagination.current_page"></span> of <span x-text="pagination.total_pages"></span>
        </span>
        <button @click="fetchPosts(pagination.current_page + 1)" :disabled="!pagination.has_next"
                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
            Next
        </button>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('blogTabManager', () => ({
            items: [],
            isLoading: true,
            pagination: {},
            search: '',

            init() {
                this.fetchPosts(1);
                this.$watch('search', () => this.fetchPosts(1));
            },

            async fetchPosts(page = 1) {
                this.isLoading = true;
                const params = new URLSearchParams({
                    page: page,
                    search: this.search,
                    limit: 20
                });

                try {
                    const response = await fetch(`{% url 'blog:api_manage_posts' %}?${params.toString()}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    });
                    if (!response.ok) throw new Error('Failed to load posts');
                    const data = await response.json();
                    this.items = data.items;
                    this.pagination = data.pagination;
                } catch (error) {
                    console.error('Error fetching blog posts:', error);
                    Alpine.store('globals').showToast('Failed to load blog posts.', 'error');
                } finally {
                    this.isLoading = false;
                }
            }
        }));
    });
</script>
