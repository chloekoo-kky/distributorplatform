<div x-data="categoryManager()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-semibold text-gray-700">Manage Categories</h3>

        <div class="flex items-center space-x-4">
            <div class="w-64">
                <input type="text" x-model.debounce.500ms="search" placeholder="Search categories..."
                       class="w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        <template x-if="categories.length === 0">
            <div class="col-span-full text-center text-gray-500 py-10 bg-white rounded-lg shadow-sm border border-gray-100">
                No categories found.
            </div>
        </template>

        <template x-for="cat in categories" :key="cat.id">
            <div class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow duration-200 border border-gray-100 flex flex-col">
                <div class="p-5 flex-1 flex flex-col">
                    <div class="flex items-start justify-between gap-3 mb-3">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100 truncate max-w-[60%]"
                              x-text="cat.group"></span>
                        <span class="text-xs font-mono text-gray-400 shrink-0" x-text="cat.code || ''" x-show="cat.code"></span>
                    </div>

                    <h4 class="text-base font-semibold text-gray-900 leading-snug line-clamp-2 mb-4" x-text="cat.name"></h4>

                    <div class="mt-auto flex items-end justify-between gap-3">
                        <div>
                            <p class="text-3xl font-bold text-gray-900 tabular-nums" x-text="cat.product_count ?? 0"></p>
                            <p class="text-xs text-gray-500 mt-0.5"
                               x-text="(cat.product_count ?? 0) === 1 ? 'product' : 'products'"></p>
                        </div>
                        <button type="button"
                                @click="$dispatch('open-category-modal', cat.id)"
                                class="inline-flex items-center justify-center p-1.5 border border-gray-300 rounded-md text-gray-600 bg-white hover:bg-gray-50 hover:text-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 shrink-0"
                                title="Edit category"
                                aria-label="Edit category">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
function categoryManager() {
    return {
        categories: [],
        search: '',

        init() {
            this.$watch('search', () => this.fetchCategories());
            this.fetchCategories();
        },

        async fetchCategories() {
            try {
                const res = await fetch(`{% url 'product:api_manage_categories' %}?search=${this.search}`, {
                    headers: {'X-Requested-With': 'XMLHttpRequest'}
                });
                const data = await res.json();
                this.categories = data.categories;
            } catch(e) { console.error(e); }
        }
    }
}
</script>
