{# Edit order header / customer snapshot (manage orders). Uses ordersManager Alpine scope. #}

<div x-show="showEditDetailsModal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-60 backdrop-blur-sm"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     style="display: none;"
     @keydown.escape.window="closeEditDetailsModal()"
     x-cloak>

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] flex flex-col overflow-hidden"
         @click.away="closeEditDetailsModal()">

        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-start bg-gray-50 flex-shrink-0">
            <div>
                <h3 class="text-xl font-bold text-gray-900">Edit order details</h3>
                <div class="mt-1 flex flex-wrap items-center gap-2 text-sm text-gray-500">
                    <span class="text-base font-semibold bg-gray-200 px-2 py-0.5 rounded text-gray-800"
                          x-text="editDetailsRowOrder ? '#' + editDetailsRowOrder.id : ''"></span>
                    <span x-show="editDetailsMeta.status_display" x-text="editDetailsMeta.status_display"></span>
                    <span x-show="editDetailsMeta.is_manual_order"
                          class="text-xs font-medium px-2 py-0.5 rounded bg-amber-100 text-amber-800">Manual</span>
                </div>
            </div>
            <button type="button" @click="closeEditDetailsModal()"
                    class="text-gray-400 hover:text-gray-600 rounded-full p-1 hover:bg-gray-100 focus:outline-none">
                <span class="sr-only">Close</span>
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <div class="px-6 py-4 flex-1 overflow-y-auto">
            <div x-show="editDetailsLoading" class="py-10 flex justify-center text-gray-500 text-sm">
                Loading order…
            </div>

            <div x-show="!editDetailsLoading" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Customer name</label>
                        <input type="text" x-model="editDetailsForm.customer_name"
                               class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                        <input type="text" x-model="editDetailsForm.customer_phone"
                               class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Transaction date</label>
                        <input type="date" x-model="editDetailsForm.transaction_date"
                               class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Sales channel</label>
                        <select x-model="editDetailsForm.sales_channel"
                                class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                            {% for value, label in sales_channel_choices %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Payment method</label>
                        <input type="text" x-model="editDetailsForm.payment_method"
                               class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                               placeholder="e.g. COD, Transfer">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Shipping address</label>
                    <textarea x-model="editDetailsForm.shipping_address" rows="3"
                              class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Remarks</label>
                    <input type="text" x-model="editDetailsForm.remarks"
                           class="w-full border border-gray-300 rounded-lg shadow-sm py-2 px-3 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                           placeholder="Platform order ID, notes…">
                </div>
                <p class="text-xs text-gray-500">Status is updated separately. Product lines for manual orders can be edited while the order is still pending (manual order entry).</p>
            </div>
        </div>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3 flex-shrink-0 rounded-b-xl">
            <button type="button" @click="closeEditDetailsModal()"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Cancel
            </button>
            <button type="button" @click="saveEditDetails()"
                    :disabled="editDetailsLoading || editDetailsSaving"
                    class="inline-flex items-center px-5 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg x-show="editDetailsSaving" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Save changes
            </button>
        </div>
    </div>
</div>
